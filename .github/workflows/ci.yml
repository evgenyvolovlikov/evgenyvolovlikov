name: CI Pipeline

on:
    push:
        branches: [master]

jobs:
    quality-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Run All Checks
              run: |
                  pnpm run type:check
                  pnpm run format:check
                  pnpm run lint:check
                  pnpm run lint:styles
                  pnpm run build:prod
