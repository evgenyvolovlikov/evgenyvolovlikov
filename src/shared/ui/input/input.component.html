<div class="form__control">
	<div class="form__icon">
		<img
			[src]="iconUrl"
			width="24"
			height="24"
			[alt]="type"
		/>
	</div>
	<input
		class="form__input"
		[type]="type"
		[placeholder]="placeholder"
		[disabled]="disabled"
		[(ngModel)]="value"
		(input)="onInput($event.target.value)"
	/>
</div>
