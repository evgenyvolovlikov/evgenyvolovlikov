<div class="layout">
	<div class="layout__image">
		<div class="layout__logo">
			<img
				class="layout__logo--image"
				ngSrc="images/logo.svg"
				alt="Cryptik logo"
				width="445"
				height="107"
			/>
		</div>
	</div>
	<div class="layout__page">
		<div class="login__container">
			<h1 class="login__heading">Вход</h1>
			<div class="login__form">
				<app-input
					class="login__form--control"
					iconUrl="icons/letter.svg"
				/>

				<app-password-input
					class="login__form--control"
					iconUrl="icons/lock.svg"
				/>

				<app-button>
					<span>Войти</span>
				</app-button>
			</div>
		</div>
	</div>
</div>
